<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complex Grid Layout</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #4CAF50;
            color: white;
            text-align: center;
            padding: 1em 0;
        }

        section {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            padding: 10px;
        }

        .row {
            background-color: #f2f2f2;
            border: 1px solid #ddd;
            padding: 20px;
            text-align: center;
            border-radius: 5px;
        }
        .bgTomato{
            background-color: rgba(193, 50, 25, 0.759);
        }

        #row-1 {
            /* grid-column: span 3; */
            grid-row: span 6; /* its make 5 row span it works on down  */
        }
        #row-2 {
            grid-column: span 2; /* row-2 makes inline 2 block span */
        }
         #row-3 {
            grid-row: span 2; 
        }
         #row-4 {
            grid-row: span 2; 
        }
         #row-5 {
            grid-row: span 2; 
        }
         #row-8{
            grid-column: span 2; 
        }
        #row-9 , #row-10  {
            grid-column: span 2; 
        }
        #row-11 , #row-12 {
            grid-column: span 4; 
        }
        #row-13 {
            grid-column: span 5; 
            background-color: rgba(54, 218, 79, 0.232);
        }
        
     
    </style>
</head>
<body>
    <header>
        <h1>Complex Grid Layout</h1>
    </header>

    <section>
        <div class="row " id="row-1">Item-1</div>
        <div class="row" id="row-2">Item-2</div>
        <div class="row" id="row-3">Item-3</div>
        <div class="row" id="row-4">Item-4</div>
        <div class="row" id="row-5">Item-5</div>
        <div class="row "  id="row-6">Item-6</div>
        <div class="row " id="row-7">Item-7</div>
        <div class="row bgTomato" id="row-8">Item-8</div>
        <div class="row " id="row-9">Item-9</div>
        <div class="row bgTomato" id="row-10">Item-10</div>
        <div class="row" id="row-11">Item-11</div>
        <div class="row" id="row-12">Item-12</div>
        <div class="row" id="row-13">Item-13</div>
    </section>
</body>
</html>
